<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <title>擷取的答案 — Stay Visible</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 16px;
      font-family: sans-serif;
      font-size: 14px;
      background: #f5f5f5;
      color: #222;
    }
    h1 { font-size: 18px; margin: 0 0 12px; }
    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    button {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #clearBtn { background: #f44336; color: #fff; }
    #empty {
      color: #888;
      text-align: center;
      margin-top: 60px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 10px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }
    .card .q {
      color: #555;
      margin-bottom: 6px;
      font-size: 13px;
    }
    .card .a {
      font-weight: bold;
      color: #2e7d32;
      font-size: 14px;
    }
    .card .meta {
      font-size: 11px;
      color: #aaa;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <h1>擷取的答案</h1>
  <div class="toolbar">
    <button id="clearBtn">清除全部</button>
  </div>
  <div id="empty" hidden>尚無擷取到的答案</div>
  <div id="list"></div>
  <script src="answers.js"></script>
</body>
</html>
