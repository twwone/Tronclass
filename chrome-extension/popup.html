<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: sans-serif;
      font-size: 14px;
      background: #fff;
      color: #222;
    }

    /* 頂部工具列 */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #eee;
    }
    .topbar span { font-weight: bold; font-size: 14px; }
    .toggle-btn {
      font-size: 12px;
      padding: 3px 8px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .toggle-btn.on  { background: #4caf50; color: #fff; }
    .toggle-btn.off { background: #f44336; color: #fff; }

    /* 答案區 */
    .answer-area {
      padding: 14px 12px;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .no-data {
      color: #aaa;
      text-align: center;
      margin: auto;
      font-size: 13px;
    }
    .question-text {
      font-size: 12px;
      color: #666;
      line-height: 1.5;
      max-height: 60px;
      overflow-y: auto;
    }
    .answer-label { font-size: 11px; color: #888; }
    .answer-value {
      font-size: 16px;
      font-weight: bold;
      color: #2e7d32;
      line-height: 1.4;
      word-break: break-all;
    }

    /* 導航列 */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-top: 1px solid #eee;
      background: #fafafa;
    }
    .nav button {
      width: 32px;
      height: 28px;
      border: 1px solid #ddd;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    .nav button:disabled { opacity: 0.3; cursor: default; }
    .nav .counter { font-size: 12px; color: #888; }

    /* 偵測模式 */
    .debug-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      border-top: 1px solid #eee;
      background: #fffde7;
      font-size: 12px;
      color: #666;
    }
    .debug-bar.active { background: #fff3e0; }
    .debug-bar label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .debug-bar button {
      font-size: 11px;
      padding: 3px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      cursor: pointer;
    }

    /* 清除按鈕 */
    .footer {
      padding: 6px 12px 10px;
      text-align: right;
    }
    .clear-btn {
      font-size: 11px;
      color: #aaa;
      background: none;
      border: none;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span>Stay Visible</span>
    <button class="toggle-btn" id="toggleBtn">載入中</button>
  </div>

  <div class="answer-area" id="answerArea">
    <div class="no-data" id="noData">尚無擷取到的答案</div>
    <div id="dataView" hidden>
      <div class="question-text" id="questionText"></div>
      <div class="answer-label">✅ 正確答案</div>
      <div class="answer-value" id="answerValue"></div>
    </div>
  </div>

  <div class="nav" id="nav" hidden>
    <button id="prevBtn">‹</button>
    <span class="counter" id="counter"></span>
    <button id="nextBtn">›</button>
  </div>

  <div class="debug-bar" id="debugBar">
    <label>
      <input type="checkbox" id="debugToggle" />
      偵測模式
    </label>
    <button id="exportBtn" hidden>匯出 JSON</button>
  </div>

  <div class="footer">
    <button class="clear-btn" id="clearBtn">清除所有記錄</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
